name: CI Auto-Scan on Main Push

on:
  push:
    branches: [main]

permissions:
  pull-requests: read
  contents: read

concurrency:
  group: ci-main-push-scan
  cancel-in-progress: false

jobs:
  scan-and-trigger:
    runs-on: [self-hosted, Linux]
    defaults:
      run:
        working-directory: .github/scripts
    steps:
      - name: Checkout repository (attempt 1)
        id: checkout1
        continue-on-error: true
        uses: actions/checkout@v4

      - name: Checkout repository (attempt 2)
        if: steps.checkout1.outcome == 'failure'
        id: checkout2
        continue-on-error: true
        uses: actions/checkout@v4

      - name: Checkout repository (attempt 3)
        if: steps.checkout2.outcome == 'failure'
        uses: actions/checkout@v4

      - name: Check Python
        run: python3 --version
      - name: Scan open PRs and trigger qualifying CI
        run: |
          python3 -m ci_gate scan-and-trigger \
            "${{ github.repository }}" \
            "${{ github.run_id }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            --ci-secret "${{ secrets.CI_SECRET }}" \
            --max-triggers 10 \
            --trigger-cooldown 10 \
            --merge-max-retries 3 \
            --merge-retry-interval 5 \
            --precheck-max-attempts 2 \
            --precheck-sleep-interval 5
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Main push scan failed — possible API rate limit or script error"
