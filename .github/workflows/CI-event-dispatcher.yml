# ┌─────────────────────────────────────────────────────────────────┐
# │ CI Architecture — Event Dispatcher                              │
# │                                                                 │
# │ pull_request (opened/synchronize/reopened)                      │
# │   → CI-request-trigger.yml                                      │
# │   → creates native "build" check run on PR HEAD SHA             │
# │   → resolve-context checks for fresh LGTM                       │
# │   → no LGTM → exit 1 → build check = failure (blocks merge)    │
# │   → has LGTM → pre-check / trigger / wait internal CI           │
# │   → CI pass → build check = success → PR mergeable              │
# │                                                                 │
# │ LGTM review/comment (this workflow)                             │
# │   → filter: only approved review or LLLLKKKK "lgtm ready to ci"│
# │   → resolve PR number and HEAD SHA from event                   │
# │   → find existing CI-request-trigger.yml pull_request run       │
# │     for this HEAD SHA                                           │
# │   → rerun that run (POST .../actions/runs/{id}/rerun)           │
# │   → rerun re-evaluates resolve-context with latest reviews      │
# │   → native "build" check on PR HEAD SHA is updated              │
# │   → required "build" can pass                                   │
# │                                                                 │
# │ workflow_dispatch                                               │
# │   → manual/debug fallback only                                  │
# │   → does NOT create native PR HEAD "build" check                │
# │   → must not be used as the normal LGTM path                    │
# │                                                                 │
# │ This workflow must NOT start a parallel workflow_dispatch or     │
# │ create a separate "build" check/status.                         │
# └─────────────────────────────────────────────────────────────────┘
name: CI Event Dispatcher

on:
  pull_request_review:
    types: [submitted]
    branches: ["main"]
  issue_comment:
    types: [created, edited]

permissions:
  actions: write
  pull-requests: write
  issues: read

jobs:
  dispatch:
    if: >-
      (github.event_name == 'pull_request_review' &&
       (github.event.review.state == 'approved' ||
        (github.event.review.user.login == 'LLLLKKKK' &&
         github.event.review.state == 'commented'))) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.user.login == 'LLLLKKKK' &&
       contains(github.event.comment.body, 'lgtm ready to ci'))
    runs-on: [self-hosted, Linux]
    steps:
      # For PRs from forks, `pull_request_review` grants the dispatcher a
      # read-only GITHUB_TOKEN with no secret access, so the rerun API call
      # below would 403. Set a sentinel so subsequent steps short-circuit;
      # `dispatcher-fork-helper.yml` (triggered via workflow_run, which runs
      # in base context with full permissions) handles the rerun instead.
      - name: Detect fork PR review (delegated to helper)
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review" ] && \
             [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
            echo "Fork PR review detected (#${{ github.event.pull_request.number }} @ ${{ github.event.pull_request.head.sha }})."
            echo "Delegating rerun to dispatcher-fork-helper.yml via workflow_run."
            echo "delegated=true" >> "$GITHUB_OUTPUT"
          else
            echo "delegated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve PR context
        id: ctx
        if: steps.guard.outputs.delegated != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            PR_NUMBER="${{ github.event.issue.number }}"
            HEAD_SHA=$(curl -sf -H "Authorization: token ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['head']['sha'])")
          fi
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "Dispatching CI for PR #${PR_NUMBER} @ ${HEAD_SHA:0:8}"

      - name: Checkout repository (attempt 1)
        id: checkout1
        if: steps.guard.outputs.delegated != 'true'
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: .github/scripts

      - name: Checkout repository (attempt 2)
        if: steps.guard.outputs.delegated != 'true' && steps.checkout1.outcome == 'failure'
        id: checkout2
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: .github/scripts

      - name: Checkout repository (attempt 3)
        if: steps.guard.outputs.delegated != 'true' && steps.checkout2.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: .github/scripts

      - name: Rerun PR build
        if: steps.guard.outputs.delegated != 'true'
        run: |
          python3 -m ci_gate rerun-pr-build \
            --repository "${{ github.repository }}" \
            --pr-number "${{ steps.ctx.outputs.pr_number }}" \
            --head-sha "${{ steps.ctx.outputs.head_sha }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}"
        working-directory: .github/scripts
