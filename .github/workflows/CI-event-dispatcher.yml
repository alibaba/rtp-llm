name: CI Event Dispatcher

on:
  pull_request_review:
    types: [submitted]
    branches: ["main"]
  issue_comment:
    types: [created, edited]

permissions:
  actions: write
  pull-requests: read
  issues: read

jobs:
  dispatch:
    if: >-
      (github.event_name == 'pull_request_review' &&
       (github.event.review.state == 'approved' ||
        (github.event.review.user.login == 'LLLLKKKK' &&
         github.event.review.state == 'commented'))) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.user.login == 'LLLLKKKK' &&
       contains(github.event.comment.body, 'lgtm ready to ci'))
    runs-on: [self-hosted, Linux]
    steps:
      - name: Resolve PR context
        id: ctx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            PR_NUMBER="${{ github.event.issue.number }}"
            HEAD_SHA=$(curl -sf -H "Authorization: token ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['head']['sha'])")
          fi
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "Dispatching CI for PR #${PR_NUMBER} @ ${HEAD_SHA:0:8}"

      - name: Trigger CI workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/CI-request-trigger.yml/dispatches" \
            -d '{"ref":"main","inputs":{"pr_number":"${{ steps.ctx.outputs.pr_number }}","head_sha":"${{ steps.ctx.outputs.head_sha }}"}}'
