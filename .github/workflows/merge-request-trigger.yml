name: Merge Request Trigger

on:
  pull_request:
    types:
      - closed

jobs:
  trigger-on-merge:
    runs-on: [self-hosted, Linux]
    defaults:
      run:
        working-directory: .github/scripts

    steps:
      - name: Checkout repository (attempt 1)
        id: checkout1
        continue-on-error: true
        uses: actions/checkout@v4

      - name: Checkout repository (attempt 2)
        if: steps.checkout1.outcome == 'failure'
        id: checkout2
        continue-on-error: true
        uses: actions/checkout@v4

      - name: Checkout repository (attempt 3)
        if: steps.checkout2.outcome == 'failure'
        id: checkout3
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x trigger-merge.sh get-merge-result.sh check-merge-done.sh

      # Backstop dedup: if pre-merge-gate already merged this commit, skip.
      # Exits 0 when already merged (skip trigger), non-zero otherwise (run trigger).
      - name: Pre-check internal merge status
        id: precheck
        if: github.event.pull_request.merged == true
        continue-on-error: true
        run: |
          ./check-merge-done.sh "${{ github.event.pull_request.head.sha }}" "${{ secrets.CI_SECRET }}" "${{ github.repository }}"

      - name: Trigger Aone Merge Task (backstop)
        id: trigger
        if: github.event.pull_request.merged == true && steps.precheck.outcome == 'failure'
        run: |
          echo "Triggering Aone merge for commit ${{ github.event.pull_request.head.sha }}"
          PR_ID="${{ github.event.pull_request.number }}"
          echo "PR ID is $PR_ID"
          ./trigger-merge.sh "${{ github.event.pull_request.head.sha }}" "${{ secrets.CI_SECRET }}" "${{ github.actor_id }}${{ github.actor }}@users.github.com" "${{ github.actor }}" "auto-merge: github commit ${{ github.event.pull_request.head.sha }}" "$PR_ID"
        env:
          AONE_PROJECT_ID: "3512232"
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Get Merge Result
        if: github.event.pull_request.merged == true && steps.precheck.outcome == 'failure'
        run: |
          echo "Polling for merge result of commit ${{ github.event.pull_request.head.sha }}"
          ./get-merge-result.sh "${{ github.event.pull_request.head.sha }}" "${{ secrets.CI_SECRET }}" "${{ github.repository }}"