name: Merge Request Trigger

on:
  pull_request:
    types:
      - closed

jobs:
  trigger-on-merge:
    if: github.event.pull_request.merged == true
    runs-on: [self-hosted, Linux]
    defaults:
      run:
        working-directory: .github/scripts

    steps:
      - name: Checkout repository (attempt 1)
        id: checkout1
        continue-on-error: true
        uses: actions/checkout@v4

      - name: Checkout repository (attempt 2)
        if: steps.checkout1.outcome == 'failure'
        id: checkout2
        continue-on-error: true
        uses: actions/checkout@v4

      - name: Checkout repository (attempt 3)
        if: steps.checkout2.outcome == 'failure'
        uses: actions/checkout@v4

      - name: Check Python
        run: python3 --version

      - name: Pre-check internal merge (backstop dedup)
        id: precheck
        run: |
          if python3 -m ci_gate check-merge-done \
            "${{ github.event.pull_request.head.sha }}" \
            "${{ secrets.CI_SECRET }}" \
            "${{ github.repository }}" \
            --output-file "$GITHUB_OUTPUT"; then
            echo "Internal merge already done or in progress; will not retrigger"
          else
            echo "Internal merge not yet done; will trigger"
          fi

      - name: Trigger Aone Merge Task (backstop)
        if: steps.precheck.outputs.merge_action == 'trigger'
        run: |
          echo "Triggering Aone merge for commit ${{ github.event.pull_request.head.sha }}"
          python3 -m ci_gate trigger-merge \
            "${{ github.event.pull_request.head.sha }}" \
            "${{ secrets.CI_SECRET }}" \
            --repository "${{ github.repository }}" \
            --pr-id "${{ github.event.pull_request.number }}" \
            --author-email "${{ github.actor_id }}${{ github.actor }}@users.github.com" \
            --author-name "${{ github.actor }}" \
            --merge-message "auto-merge: github commit ${{ github.event.pull_request.head.sha }}"

      - name: Get Merge Result
        if: steps.precheck.outputs.merge_action != 'done'
        run: |
          echo "Polling for merge result of commit ${{ github.event.pull_request.head.sha }}"
          python3 -m ci_gate wait-merge \
            "${{ github.event.pull_request.head.sha }}" \
            "${{ secrets.CI_SECRET }}" \
            "${{ github.repository }}"
