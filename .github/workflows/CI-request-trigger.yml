# ┌─────────────────────────────────────────────────────────────────┐
# │ CI Architecture — Request Trigger                               │
# │                                                                 │
# │ Two jobs:                                                       │
# │   build — internal CI for the PR HEAD                           │
# │   gate  — internal merge gate (needs: build)                    │
# │                                                                 │
# │ pull_request (opened/synchronize/reopened) — this workflow      │
# │   → native "build" check run created on PR HEAD SHA             │
# │   → resolve-context: check for fresh LGTM review/comment       │
# │   → no fresh LGTM                                              │
# │       → resolve-context exit 1                                  │
# │       → build check = failure (blocks merge)                    │
# │       → gate skipped because needs: build (build red blocks     │
# │         merge anyway)                                           │
# │       → when LGTM arrives, CI-event-dispatcher.yml reruns this  │
# │   → has fresh LGTM                                             │
# │       → pre-check internal CI status                            │
# │       → if not done → trigger internal CI                       │
# │       → wait for internal CI result                             │
# │       → CI pass → build check = success                         │
# │       → CI fail → build check = failure                         │
# │                                                                 │
# │ gate (needs: build, runs after build success)                   │
# │   → require fresh APPROVED review (LGTM-only does NOT pass)     │
# │   → precheck (3-way): merge_action = done | wait | trigger      │
# │       done    → skip trigger and wait, gate green directly      │
# │       wait    → skip trigger; only run wait-merge for in-flight │
# │       trigger → trigger-merge + wait-merge                      │
# │   → Aone MERGE-TASK uses mergeType: REBASE so drift is handled  │
# │     by the internal service; conflicts surface via wait-merge   │
# │   → success → gate check green → PR mergeable                   │
# │                                                                 │
# │ Internal merge happens BEFORE external merge (gate job),        │
# │ not after — merge-request-trigger.yml is now backstop only.     │
# │                                                                 │
# │ LGTM review/comment                                            │
# │   → CI-event-dispatcher.yml handles this event                  │
# │   → finds this workflow's pull_request run for PR HEAD SHA      │
# │   → reruns it (POST .../actions/runs/{id}/rerun)                │
# │   → this workflow executes again with latest review state       │
# │   → both build and gate are re-evaluated                        │
# │                                                                 │
# │ workflow_dispatch                                               │
# │   → manual/debug fallback only; runs build, NOT gate            │
# │   → does NOT update native PR HEAD "build" check                │
# │   → writes commit status "CI Request Trigger" (non-required)    │
# │                                                                 │
# │ Required setup (Settings → Branches → main → protection):       │
# │   - Require status checks before merging                        │
# │     - add `build` and `gate` as required                        │
# │   - Require pull request reviews before merging                 │
# │     - Dismiss stale pull request approvals when new commits     │
# │       are pushed (so push → re-approve → both jobs re-run)      │
# └─────────────────────────────────────────────────────────────────┘
name: CI Request Trigger

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to trigger CI for"
        required: true
        type: string
      head_sha:
        description: "PR HEAD SHA to trigger CI for"
        required: true
        type: string
      skip_review_check:
        description: "Skip review qualification check (maintainer override)"
        required: false
        type: boolean
        default: false

permissions:
  pull-requests: read
  contents: read
  statuses: write

concurrency:
  group: >-
    ${{ github.workflow }}-${{
      github.event_name == 'workflow_dispatch'
        && inputs.pr_number
        || github.event.pull_request.number
    }}
  # gate performs an internal merge that must NOT be killed mid-flight; a
  # cancelled run can leave the internal source in a half-merged state. We
  # accept the trade-off of stacking up build runs on rapid pushes.
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request'
    runs-on: [self-hosted, Linux]
    defaults:
      run:
        working-directory: .github/scripts
    steps:
      - name: Checkout repository (attempt 1)
        id: checkout1
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || 'main' }}

      - name: Checkout repository (attempt 2)
        if: steps.checkout1.outcome == 'failure'
        id: checkout2
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || 'main' }}

      - name: Checkout repository (attempt 3)
        if: steps.checkout2.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || 'main' }}

      - name: Check Python
        run: python3 --version

      - name: Check review qualification
        id: review-gate
        run: |
          python3 -m ci_gate resolve-context \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            --event-name "${{ github.event_name }}" \
            --repository "${{ github.repository }}" \
            --input-pr-number "${{ inputs.pr_number }}" \
            --input-head-sha "${{ inputs.head_sha }}" \
            --input-skip-review "${{ inputs.skip_review_check }}" \
            --event-head-sha "${{ github.event.pull_request.head.sha }}" \
            --event-pr-number "${{ github.event.pull_request.number }}" \
            --event-clone-url "${{ github.event.pull_request.head.repo.clone_url }}" \
            --output-file "$GITHUB_OUTPUT"

      - name: Set pending commit status
        if: github.event_name == 'workflow_dispatch' && steps.review-gate.outputs.qualified == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ steps.review-gate.outputs.head_sha }}" \
            -d '{
              "state": "pending",
              "context": "CI Request Trigger",
              "description": "CI is running...",
              "target_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

      - name: Check merge conflicts
        if: steps.review-gate.outputs.qualified == 'true'
        run: |
          python3 -m ci_gate check-merge \
            "${{ steps.review-gate.outputs.pr_number }}" \
            "${{ steps.review-gate.outputs.head_sha }}" \
            "${{ github.repository }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}"

      - name: Pre-check CI status
        id: pre-check
        if: steps.review-gate.outputs.qualified == 'true'
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          echo "Pre-checking CI status for Commit ID: ${{ steps.review-gate.outputs.head_sha }}"
          if python3 -m ci_gate pre-check-status \
            "${{ steps.review-gate.outputs.head_sha }}" \
            "${{ secrets.CI_SECRET }}" \
            "${{ github.repository }}" \
            --max-attempts 6 \
            --sleep-interval 20 \
            --output-file "$GITHUB_OUTPUT"; then
            echo "CI already completed or running, will not trigger duplicate CI"
          else
            echo "CI not completed, will trigger new CI"
          fi

      - name: Trigger CI
        if: steps.review-gate.outputs.qualified == 'true' && steps.pre-check.outputs.ci_action == 'trigger'
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          echo "Using Commit ID: ${{ steps.review-gate.outputs.head_sha }}"
          python3 -m ci_gate trigger-ci \
            "${{ steps.review-gate.outputs.head_sha }}" \
            "${{ secrets.CI_SECRET }}" \
            "${{ steps.review-gate.outputs.clone_url }}" \
            "${{ steps.review-gate.outputs.pr_number }}" \
            "${{ github.run_id }}" \
            --repository "${{ github.repository }}"
          sleep 30

      - name: Add comment via REST API
        if: steps.review-gate.outputs.qualified == 'true' && steps.review-gate.outputs.pr_number != '' && steps.pre-check.outputs.ci_action == 'trigger'
        continue-on-error: true
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          python3 -m ci_gate sync-comment \
            "${{ steps.review-gate.outputs.pr_number }}" \
            "${{ github.repository }}" \
            "${{ steps.review-gate.outputs.head_sha }}" \
            "${{ secrets.CI_SECRET }}" \
            --comment "internal source has been updated, please review the changes!" \
            --source "RTP" \
            --main-branch "main-internal" \
            --max-retries 5 \
            --retry-interval 5

      - name: Get CI result
        if: steps.review-gate.outputs.qualified == 'true' && steps.pre-check.outputs.ci_action != 'done'
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          echo "Using Commit ID: ${{ steps.review-gate.outputs.head_sha }}"
          python3 -m ci_gate wait-status \
            "${{ steps.review-gate.outputs.head_sha }}" \
            "${{ secrets.CI_SECRET }}" \
            "${{ github.repository }}" \
            --max-wait-time 28800 \
            --max-wait-pending-time 21600 \
            --max-wait-running-time 7200

      - name: Update commit status
        if: always() && github.event_name == 'workflow_dispatch' && steps.review-gate.outputs.head_sha != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATE="success"; DESC="CI passed"
          else
            STATE="failure"; DESC="CI failed"
          fi
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ steps.review-gate.outputs.head_sha }}" \
            -d "{
              \"state\": \"${STATE}\",
              \"context\": \"CI Request Trigger\",
              \"description\": \"${DESC}\",
              \"target_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"

  # gate: internal merge gate, runs after build success.
  # `if: always() && pull_request` lets gate run even when build fails so it
  # can explicitly fail (skipping a required check would let GitHub treat it
  # as success in branch protection — bypassing the gate).
  gate:
    needs: build
    if: always() && github.event_name == 'pull_request'
    runs-on: [self-hosted, Linux]
    defaults:
      run:
        working-directory: .github/scripts
    steps:
      - name: Verify build job succeeded
        if: needs.build.result != 'success'
        run: |
          echo "::error::Build job did not succeed (result=${{ needs.build.result }}); refusing to merge"
          exit 1

      # gate runs with the high-privilege CI_SECRET. Pin checkout to trusted
      # main so PR branch code cannot replace the helper modules executed below.
      - name: Checkout repository (attempt 1)
        id: checkout1
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout repository (attempt 2)
        if: steps.checkout1.outcome == 'failure'
        id: checkout2
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout repository (attempt 3)
        if: steps.checkout2.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Require APPROVED review on PR HEAD
        run: |
          python3 -m ci_gate check-review \
            "${{ github.event.pull_request.number }}" \
            "${{ github.repository }}" \
            "${{ github.event.pull_request.head.sha }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            --require-approved \
            --verify-current-head

      - name: Pre-check internal merge (re-approval dedup)
        id: precheck
        run: |
          if python3 -m ci_gate check-merge-done \
            "${{ github.event.pull_request.head.sha }}" \
            "${{ secrets.CI_SECRET }}" \
            "${{ github.repository }}" \
            --output-file "$GITHUB_OUTPUT"; then
            echo "Internal merge already done or in progress; will not retrigger"
          else
            echo "Internal merge not yet done; will trigger"
          fi

      - name: Trigger internal merge
        if: steps.precheck.outputs.merge_action == 'trigger'
        run: |
          echo "Triggering internal merge for commit ${{ github.event.pull_request.head.sha }}"
          python3 -m ci_gate trigger-merge \
            "${{ github.event.pull_request.head.sha }}" \
            "${{ secrets.CI_SECRET }}" \
            --repository "${{ github.repository }}" \
            --pr-id "${{ github.event.pull_request.number }}" \
            --author-email "${{ github.actor_id }}${{ github.actor }}@users.github.com" \
            --author-name "${{ github.actor }}" \
            --merge-message "pre-merge-gate: github commit ${{ github.event.pull_request.head.sha }}"

      - name: Wait for internal merge result
        if: steps.precheck.outputs.merge_action != 'done'
        run: |
          python3 -m ci_gate wait-merge \
            "${{ github.event.pull_request.head.sha }}" \
            "${{ secrets.CI_SECRET }}" \
            "${{ github.repository }}"
