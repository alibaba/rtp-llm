name: CI Request Trigger

on:
  pull_request_review:
    types: [submitted]
    branches: ["main"]
  # synchronize fires on force-push / new commits. Fresh-review gate will
  # reject it unless a reviewer has already approved the *new* HEAD SHA,
  # which is the intended safety behavior: un-reviewed changes don't get CI.
  # The main-push-scan workflow provides a catch-all for PRs that gain a
  # fresh review before the next synchronize event.
  pull_request:
    types: [synchronize]
    branches: ["main"]
  # issue_comment fires on PR conversation comments (not review comments).
  # This lets LLLLKKKK trigger CI via a plain "lgtm ready to ci" comment.
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to trigger CI for"
        required: true
        type: string
      head_sha:
        description: "PR HEAD SHA to trigger CI for"
        required: true
        type: string
      skip_review_check:
        description: "Skip review qualification check (maintainer override)"
        required: false
        type: boolean
        default: false

permissions:
  pull-requests: read
  contents: read
  issues: read

concurrency:
  group: >-
    ${{ github.workflow }}-${{
      github.event_name == 'workflow_dispatch'
        && inputs.pr_number
        || github.event_name == 'issue_comment'
        && github.event.issue.number
        || github.event.pull_request.number
    }}
  cancel-in-progress: true

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_review' &&
       (github.event.review.state == 'approved' ||
        (github.event.review.user.login == 'LLLLKKKK' &&
         github.event.review.state == 'commented'))) ||
      (github.event_name == 'pull_request' &&
       github.event.action == 'synchronize') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.user.login == 'LLLLKKKK' &&
       contains(github.event.comment.body, 'lgtm ready to ci'))
    runs-on: [self-hosted, Linux]
    defaults:
      run:
        working-directory: .github/scripts
    steps:
      - name: Checkout repository (attempt 1)
        id: checkout1
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || 'main' }}

      - name: Checkout repository (attempt 2)
        if: steps.checkout1.outcome == 'failure'
        id: checkout2
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || 'main' }}

      - name: Checkout repository (attempt 3)
        if: steps.checkout2.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || 'main' }}

      - name: Check Python
        run: python3 --version

      - name: Check review qualification
        id: review-gate
        run: |
          python3 -m ci_gate resolve-context \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            --event-name "${{ github.event_name }}" \
            --repository "${{ github.repository }}" \
            --input-pr-number "${{ inputs.pr_number }}" \
            --input-head-sha "${{ inputs.head_sha }}" \
            --input-skip-review "${{ inputs.skip_review_check }}" \
            --event-head-sha "${{ github.event.pull_request.head.sha }}" \
            --event-pr-number "${{ github.event.pull_request.number || github.event.issue.number }}" \
            --event-clone-url "${{ github.event.pull_request.head.repo.clone_url }}" \
            --output-file "$GITHUB_OUTPUT"

      - name: Check merge conflicts
        if: steps.review-gate.outputs.qualified == 'true'
        run: |
          python3 -m ci_gate check-merge \
            "${{ steps.review-gate.outputs.pr_number }}" \
            "${{ steps.review-gate.outputs.head_sha }}" \
            "${{ github.repository }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}"

      - name: Pre-check CI status
        id: pre-check
        if: steps.review-gate.outputs.qualified == 'true'
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          echo "Pre-checking CI status for Commit ID: ${{ steps.review-gate.outputs.head_sha }}"
          if python3 -m ci_gate pre-check-status \
            "${{ steps.review-gate.outputs.head_sha }}" \
            "${{ secrets.CI_SECRET }}" \
            "${{ github.repository }}" \
            --max-attempts 6 \
            --sleep-interval 20 \
            --output-file "$GITHUB_OUTPUT"; then
            echo "CI already completed or running, will not trigger duplicate CI"
          else
            echo "CI not completed, will trigger new CI"
          fi

      - name: Trigger CI
        if: steps.review-gate.outputs.qualified == 'true' && steps.pre-check.outputs.ci_action == 'trigger'
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          echo "Using Commit ID: ${{ steps.review-gate.outputs.head_sha }}"
          python3 -m ci_gate trigger-ci \
            "${{ steps.review-gate.outputs.head_sha }}" \
            "${{ secrets.CI_SECRET }}" \
            "${{ steps.review-gate.outputs.clone_url }}" \
            "${{ steps.review-gate.outputs.pr_number }}" \
            "${{ github.run_id }}" \
            --repository "${{ github.repository }}"
          sleep 30

      - name: Add comment via REST API
        if: steps.review-gate.outputs.qualified == 'true' && steps.review-gate.outputs.pr_number != '' && steps.pre-check.outputs.ci_action == 'trigger'
        continue-on-error: true
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          python3 -m ci_gate sync-comment \
            "${{ steps.review-gate.outputs.pr_number }}" \
            "${{ github.repository }}" \
            "${{ steps.review-gate.outputs.head_sha }}" \
            "${{ secrets.CI_SECRET }}" \
            --comment "internal source has been updated, please review the changes!" \
            --source "RTP" \
            --main-branch "main-internal" \
            --max-retries 5 \
            --retry-interval 5

      - name: Get CI result
        if: steps.review-gate.outputs.qualified == 'true' && steps.pre-check.outputs.ci_action != 'done'
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          echo "Using Commit ID: ${{ steps.review-gate.outputs.head_sha }}"
          python3 -m ci_gate wait-status \
            "${{ steps.review-gate.outputs.head_sha }}" \
            "${{ secrets.CI_SECRET }}" \
            "${{ github.repository }}" \
            --max-wait-time 28800 \
            --max-wait-pending-time 21600 \
            --max-wait-running-time 7200
