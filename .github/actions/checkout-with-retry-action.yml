name: 'Checkout with Retry'
description: 'Checkout repository with automatic retry on failure'
inputs:
  max-attempts:
    description: 'Maximum number of retry attempts'
    required: false
    default: '3'
runs:
  using: 'composite'
  steps:
    # Log start
    - name: Log checkout retry start
      shell: bash
      run: |
        echo "=========================================="
        echo "Starting checkout with retry mechanism"
        echo "Max attempts: 3"
        echo "=========================================="
    
    # Attempt 1
    - name: Checkout (attempt 1)
      id: checkout1
      continue-on-error: true
      uses: actions/checkout@v4
    
    - name: Log attempt 1 result
      if: always()
      shell: bash
      run: |
        if [ "${{ steps.checkout1.outcome }}" == "success" ]; then
          echo "Checkout attempt 1/3: SUCCESS"
        else
          echo "Checkout attempt 1/3: FAILED"
          echo "Will retry in 10 seconds..."
          sleep 10
        fi
    
    # Attempt 2
    - name: Checkout (attempt 2)
      if: steps.checkout1.outcome == 'failure'
      id: checkout2
      continue-on-error: true
      uses: actions/checkout@v4
    
    - name: Log attempt 2 result
      if: steps.checkout1.outcome == 'failure'
      shell: bash
      run: |
        if [ "${{ steps.checkout2.outcome }}" == "success" ]; then
          echo "Checkout attempt 2/3: SUCCESS"
        else
          echo "Checkout attempt 2/3: FAILED"
          echo "Will retry in 10 seconds..."
          sleep 10
        fi
    
    # Attempt 3
    - name: Checkout (attempt 3)
      if: steps.checkout2.outcome == 'failure'
      id: checkout3
      uses: actions/checkout@v4
    
    - name: Log final result
      if: always()
      shell: bash
      run: |
        echo "=========================================="
        if [ "${{ steps.checkout1.outcome }}" == "success" ] || [ "${{ steps.checkout2.outcome }}" == "success" ] || [ "${{ steps.checkout3.outcome }}" == "success" ]; then
          echo "Checkout completed successfully"
          echo "Repository is ready, proceeding to next step"
        else
          echo "All 3 checkout attempts failed"
          echo "Please check the error logs above"
        fi
        echo "=========================================="
