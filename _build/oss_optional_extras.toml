# dev and docs extras moved to pyproject.toml [project.optional-dependencies] —
# uv pip install --compile-bytecode -e .[dev] reads PEP 621 metadata directly and silently drops
# extras declared only via setup.py extras_require. GPU extras stay here
# because they carry internal-only pin URLs.

