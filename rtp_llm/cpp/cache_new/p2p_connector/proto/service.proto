syntax = "proto2";

import "arpc/proto/rpc_extensions.proto";
option cc_generic_services = true;

package cache_store_proto;

// TODO: make all size unit same
message CacheBlockInfo {
    optional int64 key = 1;
    repeated int32 buffer_size = 2;
}

message LayerCacheBlockInfo {
    optional uint32 layer_id = 1;
    repeated CacheBlockInfo block_infos = 2;
}

message CacheLoadRequest {
    repeated LayerCacheBlockInfo layer_cache_load_infos = 1;
    optional int64 deadline_ms = 2;
    optional uint32 partition_count = 3;
    optional uint32 partition_id = 4;
    optional string ip = 5;
    optional uint32 port = 6;
    optional uint32 rdma_port = 7;
    optional int64 context_id = 8;
}

message CacheLoadResponse {
    optional bool success = 1;
    optional string info = 2;
}

message WorkerInfoRequest {}

message WorkerInfo {
    optional string ip = 1;
    optional uint32 port = 2;
    optional uint32 rdma_port = 3;
}

message WorkerInfoResponse {
    repeated WorkerInfo worker_infos = 1;
}

service CacheStoreService {
    option (arpc.global_service_id) = 10086;

    rpc workerinfo(WorkerInfoRequest) returns (WorkerInfoResponse) {
        option (arpc.local_method_id) = 10087;
    }

    rpc load(CacheLoadRequest) returns (CacheLoadResponse) {
        option (arpc.local_method_id) = 10088;
    }
}

message RdmaNicRKey {
    optional uint32 nicid = 1;
    optional uint32 rkey = 2;
}

message RdmaBlockBufferAddrInfo {
    optional uint64 addr = 1;
    repeated RdmaNicRKey nic_rkeys = 2;
};

message BlockBufferInfo {
    optional uint32 len = 1;
    optional RdmaBlockBufferAddrInfo rdma_info = 2; // use only rdma mode
    optional bytes content = 3; // use only tcp mode
}

message CacheKeyBlockBufferInfo {
    optional int64 key = 1;
    repeated BlockBufferInfo blocks = 2;
}

message LayerBlockBufferInfo {
    optional int64 layer_id = 1;
    repeated CacheKeyBlockBufferInfo blocks = 2;
}

message LayerBlockTransferRequest {
    repeated LayerBlockBufferInfo layer_blocks = 1;
    optional int64 context_id = 2;
}

message LayerBlockTransferResponse {
    optional bool success = 1;
    optional string info = 2;
}

service TransferService {
    option (arpc.global_service_id) = 10009;

    rpc transfer(LayerBlockTransferRequest) returns (LayerBlockTransferResponse) {
        option (arpc.local_method_id) = 10010;
    }
}