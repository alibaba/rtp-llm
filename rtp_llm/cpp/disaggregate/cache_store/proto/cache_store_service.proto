syntax = "proto2";

import "arpc/proto/rpc_extensions.proto";
option cc_generic_services = true;

enum KvCacheStoreServiceErrorCode {
    EC_SUCCESS = 0;
    EC_FAILED_INTERNAL = 1;
    EC_FAILED_RDMA_CONNECTION = 2;
    EC_FAILED_RDMA_WRITE = 3;
    EC_FAILED_LOAD_BUFFER = 4;
    EC_FAILED_INVALID_REQ = 5;
};

message RdmaNicRKey {
    optional uint32 nicid = 1;
    optional uint32 rkey = 2;
}

message RdmaConnectionInfo {
    optional string ip = 1;
    optional uint32 port = 2;
}

message RdmaBlockBufferAddrInfo {
    optional uint64 addr = 1;
    repeated RdmaNicRKey nic_rkeys = 2;
};

message BlockBufferInfo {
    optional string key = 1;
    optional uint32 len = 2;
    optional RdmaBlockBufferAddrInfo rdma_info = 3; // use only rdma mode
    optional bytes content = 4[ctype = RAW_STRING]; // use only tcp mode
    optional int64 addr = 5; // 使用TCP做Read, 需要指定addr

    // -------- M04 PR-3 (additive, optional; legacy peers ignore) --------
    // Advisory unified-block-id; receiver MAY skip duplicate cache_key lookups.
    optional uint64 unified_block_id = 10;
    // Index into request-level pools[] descriptor list.
    optional uint32 pool_id          = 11;
    // Per-pool drop-last-partial gate. FULL pools only (REQ-D3); SWA always false.
    optional bool   last_partial     = 12;
}

// M04 PR-3 (additive): request-level per-pool descriptor. layer_id and
// last_partial are deliberately NOT on the wire — see M04 §4.1 REQ-D5: layer_id
// is reconstructed receiver-side from cache_config.layer_region_to_group_id
// after pool_descriptor_hash agrees, and last_partial flows per-block on
// BlockBufferInfo.last_partial.
message PoolDescriptorProto {
    optional uint32 pool_id      = 1;
    optional uint32 group_type   = 2;  // CacheGroupType enum value
    optional uint32 region_name  = 3;  // KVCacheRegionName enum value
    optional uint32 stride_bytes = 4;
    optional bool   has_scale    = 5;
}

message CacheLoadRequest {
    repeated BlockBufferInfo blocks = 1;
    optional uint32 timeout_ms = 2;
    optional string client_ip = 3;
    repeated RdmaConnectionInfo rdma_connections = 4;
    optional int64 request_send_start_time_us = 5;
    optional string requestid = 6;
    optional int32 partition_count = 7;
    optional int32 partition_id = 8;

    // -------- M04 PR-3 (additive, magic-byte negotiation; M04 §4.3) ------
    // 0 = legacy sender, 1 = unified-aware (bps=1 wire schema).  Any
    // unrecognised positive value triggers receiver fallback-to-legacy
    // (never abort) per §4.3.
    optional uint32              protocol_magic = 100 [default = 0];
    // Length-N unified super-block id list (N == total_logical_blocks).
    repeated uint64              super_block_ids = 101;
    // Length-P per-pool descriptor list.
    repeated PoolDescriptorProto pools           = 102;

    // -------- F01-PR2-followup (R4-24 §5): PD handshake salt fields ------
    // Tag numbers 103/104/105 are reserved for the salt-aware handshake.
    // Field 103 ``salt_magic`` is a fixed sentinel (100 == salt-aware
    // sender, 0 == legacy / field-not-sent) used ONLY for forward-compat
    // envelope detection.  It is intentionally NAMED differently from the
    // legacy ``HandshakeInfo::protocol_magic`` (which lives in {0,1} and
    // means "is the unified-layout cache schema engaged") to avoid the
    // FIX-B HIGH-5 hazard where a naive route of proto-103 into
    // ``HandshakeInfo::protocol_magic`` would inject the sentinel 100 and
    // cause validateHandshake's unified↔unified branch to REFUSE every
    // legacy peer.  See ``KVCacheConnectorCoordinator::acceptPeerHandshakeFields``
    // — the wire-side helper maps salt_magic=0 → legacy peer (magic=0) and
    // salt_magic!=0 → unified peer iff hash_salt_version>0.  The actual
    // "is the cache_key payload salted" gate uses hash_salt_version > 0,
    // NOT salt_magic.  Default = 0 so a legacy sender (no field on the
    // wire) is unambiguously identified as legacy by the receiver.
    optional uint32 salt_magic              = 103 [default = 0];
    optional uint32 hash_salt_version       = 104 [default = 0];
    optional uint32 hash_salt_nonzero_bitmap = 105 [default = 0];
}

message CacheLoadResponse {
    optional KvCacheStoreServiceErrorCode error_code = 1;
    optional int64 response_send_start_time_us = 2;
    optional bool direct_write_response = 3[default=false]; // true is rdma, false is tcp
    repeated BlockBufferInfo blocks = 4;

    // -------- M04 PR-3 (additive; REQ-D4) ---------------------------------
    // Response-side magic so a unified→legacy response can signal that the
    // decode side is unified-aware (used by PD ring-open triple capture).
    optional uint32 protocol_magic = 100 [default = 0];

    // -------- F01-PR2-followup (R4-24 §5): PD handshake salt response ----
    // Echoed back so the request-side coordinator can confirm the receiver
    // ran ``validatePeerHandshake`` and that the salt schemas matched.
    // Tag numbers MUST stay stable across PRs — 103/104/105 are reserved.
    // See CacheLoadRequest::salt_magic for the FIX-B HIGH-5 rationale on
    // the rename + default=0 (legacy peer must NOT advertise sentinel 100).
    optional uint32 salt_magic              = 103 [default = 0];
    optional uint32 hash_salt_version       = 104 [default = 0];
    optional uint32 hash_salt_nonzero_bitmap = 105 [default = 0];
};

message CacheTransferInfo {
    optional uint32 partition_count = 1; 
    optional uint32 partition_id = 2;
    repeated string local_keys = 3;
    repeated string remote_keys = 4;
}

message CacheTransferRequest {
    optional CacheTransferInfo transfer_info = 1;
    repeated BlockBufferInfo blocks = 2;

    optional string request_id = 3;
    optional string client_ip = 4;
    optional uint32 client_port = 5; // tcp or rdma server port
    optional uint32 rdma_client_port = 6;
    optional uint32 timeout_ms = 7;
    optional int64 request_send_start_time_us = 8;

    // -------- M04 PR-3 (additive, magic-byte negotiation) -----------------
    optional uint32              protocol_magic = 100 [default = 0];
    repeated uint64              super_block_ids = 101;
    repeated PoolDescriptorProto pools           = 102;

    // -------- F01-PR2-followup (R4-24 §5): PD handshake salt fields ------
    // See ``CacheLoadRequest`` for the field-number + naming rationale
    // (FIX-B HIGH-5: salt_magic is NOT the legacy HandshakeInfo magic).
    optional uint32 salt_magic              = 103 [default = 0];
    optional uint32 hash_salt_version       = 104 [default = 0];
    optional uint32 hash_salt_nonzero_bitmap = 105 [default = 0];
}

message CacheTransferResponse {
    optional KvCacheStoreServiceErrorCode error_code = 1; 
    optional string error_msg = 2;
    optional int64 response_send_start_time_us = 3;
}

message BlockReadRequest {
    repeated BlockBufferInfo blocks = 1;
}

message BlockReadResponse {
    optional KvCacheStoreServiceErrorCode error_code = 1;
    repeated BlockBufferInfo blocks = 2;
}

service KvCacheStoreService {
    option (arpc.global_service_id) = 10000;

    rpc load(CacheLoadRequest) returns (CacheLoadResponse) {
        option (arpc.local_method_id) = 10002;
    }

    rpc transfer(CacheTransferRequest) returns (CacheTransferResponse) {
        option (arpc.local_method_id) = 10004;
    }

    // only for tcp read
    rpc blockRead(BlockReadRequest) returns (BlockReadResponse) {
        option (arpc.local_method_id) = 10006;
    }
}