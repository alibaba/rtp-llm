// message.proto
syntax = "proto3";
import "google/protobuf/wrappers.proto";

// =============================================================================
// Master ↔ Engine boundary contract (DP-aware deployments)
// =============================================================================
// 1. Service discovery exposes EXACTLY ONE address per pod, which is DP0's
//    endpoint (the leader rank). Master MUST NOT directly connect to dp_rank>0.
// 2. Cross-rank fan-out (status aggregation, batch dispatch) is handled inside
//    the pod via DpInternalService. DP0 collects per-rank status via
//    DpInternalGetWorkerStatus / DpInternalGetCacheStatus and returns the
//    aggregated view to Master.
// 3. WorkerStatusPB / CacheStatusPB outer fields are aggregate-of-pod
//    (sum / max / min / AND / union). Per-rank breakdown lives in
//    dp_status[] / dp_cache[], filled only by DP0 when dp_size>1.
// 4. dp_size==1 is the default; outer fields then equal the only rank's
//    values, dp_status[] / dp_cache[] are empty, and Master treats the pod
//    as a single-point worker (legacy ShortestTTFT/WeightedCache strategies).
// =============================================================================

message TensorPB {
    enum DataType {
        FP32 = 0;
        INT32 = 1;
        FP16 = 2;
        BF16 = 3;
    }
    DataType data_type = 1;
    repeated int64 shape = 2;
    bytes fp32_data = 3;
    bytes int32_data = 4;
    bytes fp16_data = 5;
    bytes bf16_data = 6;
}

message IntVector {
    repeated int32 values = 1;
}

message IntMatrix {
    repeated IntVector rows = 1;
}

// Endpoint of one role inside a pod. Master service discovery exposes exactly
// one RoleAddrPB per (pod, role) — and when dp_size>1 that address is always
// DP0's. Per-rank endpoints (for dp_rank>0) are NOT registered externally;
// they live inside the pod and are reached only by DP0 via DpInternalService.
message RoleAddrPB {
    enum RoleType {
        PDFUSION = 0;
        PREFILL = 1;
        DECODE = 2;
        VIT = 3;
        FRONTEND = 4;
    }
    RoleType role = 1;
    string ip = 2;
    int32 http_port = 3;
    int32 grpc_port = 4;
}

message GenerateConfigPB {
    int32 max_new_tokens = 1;
    int32 num_beams = 2;
    int32 num_return_sequences = 3;
    int32 min_new_tokens = 4;

    int32 top_k = 5;
    float top_p = 6;
    float temperature = 7;
    float repetition_penalty = 8;
    google.protobuf.Int32Value no_repeat_ngram_size = 9;
    google.protobuf.Int64Value random_seed = 10;
    google.protobuf.FloatValue top_p_decay = 11;
    google.protobuf.FloatValue top_p_min = 12;
    google.protobuf.Int32Value top_p_reset_ids = 13;
    google.protobuf.StringValue task_id = 14;
    int32 calculate_loss = 15;
    bool return_incremental = 16;
    bool return_hidden_states = 17;
    bool return_logits = 18;
    bool is_streaming = 19;
    int32 timeout_ms = 20;
    IntMatrix stop_words_list = 21;
    repeated int32 select_tokens_id = 22;
    google.protobuf.StringValue adapter_name = 23;
    bool sp_edit = 24;
    repeated int32 sp_advice_prompt_token_ids = 25;
    bool force_disable_sp_run = 26;
    // legacy compat: false=NONE, true=DEFAULT/ORIGINAL (cannot distinguish across versions)
    bool return_all_probs = 27;
    bool sp_input_lookup = 28;
    bool can_use_pd_separation = 29;
    bool return_softmax_probs = 30;
    bool return_cum_log_probs = 31;
    bool in_think_mode = 32;
    int32 max_thinking_tokens = 33;
    repeated int32 end_think_token_ids = 34;
    bool gen_timeline = 35;
    int32 global_request_id = 36;
    bool force_sp_accept = 37;
    int32 hidden_states_cut_dim = 38;
    bool normalized_hidden_states = 39;
    int32 profile_step = 40;
    repeated RoleAddrPB role_addrs = 41;
    reserved 42;
    reserved "inter_request_id";
    bool ignore_eos = 43;
    float presence_penalty = 44;
    float frequency_penalty = 45;
    bool do_sample = 46;
    bool reuse_cache = 47;
    repeated int32 variable_num_beams = 48;
    google.protobuf.StringValue trace_id = 49;
    bool return_all_hidden_states = 50;
    bool enable_memory_cache = 51;
    bool enable_device_cache = 52;
    bool enable_remote_cache = 53;
    string unique_key = 54;
    google.protobuf.Int32Value force_batch = 55;
    google.protobuf.Int32Value batch_group_timeout = 56;
    string profile_trace_name = 57;
    // 生成式推荐：组合 token 粒度去重与曝光过滤
    int32 combo_token_size = 58;
    IntMatrix banned_combo_token_ids = 59;
    // 0=unset(fallback to bool return_all_probs), 1=NONE, 2=DEFAULT, 3=ORIGINAL
    int32 return_all_probs_mode = 60;
}

message MMPreprocessConfigPB {
    int32 width = 1;
    int32 height = 2;
    int32 min_pixels = 3;
    int32 max_pixels = 4;
    int32 fps = 5;
    int32 min_frames = 6;
    int32 max_frames = 7;
    repeated float crop_positions = 8;
    int32 mm_timeout_ms = 9;
}

message MultimodalInputPB {
    string multimodal_url = 1;
    int32 multimodal_type = 2;
    TensorPB multimodal_tensor = 3;
    MMPreprocessConfigPB mm_preprocess_config = 4;
}

message MultimodalInputsPB {
    repeated MultimodalInputPB multimodal_inputs = 1;
}

message MultimodalOutputPB {
    TensorPB multimodal_embedding = 1;
    TensorPB multimodal_pos_id = 2;
    repeated TensorPB multimodal_extra_input = 3;
    repeated int32 split_size = 4;
}

message GenerateInputPB {
    int64 request_id = 1;
    repeated int32 token_ids = 2;
    repeated MultimodalInputPB multimodal_inputs = 3;
    GenerateConfigPB generate_config = 4;
    string client_id = 5;
    int64 start_time = 6;
    int32 batch_group_size = 7;
    google.protobuf.Int64Value batch_group_id = 8;
    // V1-α DP batching: assigned by Master at schedule time. Engine MUST pin the
    // request to this DP slot and MUST NOT reshuffle. The DP barrier only kicks in
    // on the pd_separation path (max_new_tokens > 1 && num_beams <= 1).
    int64 dp_rank = 9;
    // V1-α DP batching: prompt prefix block hashes precomputed by Master so prefill
    // can skip re-hashing. Same source as Request.block_cache_keys on the
    // Master HTTP /rtp_llm/schedule entry.
    repeated int64 cache_hash_key = 10;
    // V1 DP-controller: placeholder injected by DP0 into empty slots of a partial
    // batch so every DP worker runs in lockstep. V1 always ships full batches, so
    // this remains false; V1.x partial-batch handling will set it.
    bool is_fake_query = 11;
}

message AuxInfoPB {
    int32 cost_time_us = 1;
    int32 iter_count = 2;
    int32 input_len = 3;
    int32 total_reuse_len = 4;
    int32 prefix_len = 5;
    int32 output_len = 6;
    TensorPB cum_log_probs = 9;
    int32 step_output_len = 10;
    bool pd_sep = 11;
    int32 first_token_cost_time_us = 12;
    TensorPB softmax_probs = 13;
    int32 wait_time_us = 14;

    int32 local_reuse_len = 15;
    int32 remote_reuse_len = 16;
    int32 prefill_total_reuse_len = 17;
    int32 prefill_local_reuse_len = 18;
    int32 prefill_remote_reuse_len = 19;
    int32 decode_total_reuse_len = 20;
    int32 decode_local_reuse_len = 21;
    int32 decode_remote_reuse_len = 22;
    string aux_string = 23;
    int32 memory_reuse_len = 24;
    int32 prefill_memory_reuse_len = 25;
    int32 decode_memory_reuse_len = 26;
    map<int32, int32> multimodal_lengths = 27;
}

message FlattenOutputPB {
    repeated bool finished = 1;
    repeated AuxInfoPB aux_info = 2;
    TensorPB output_ids = 3;
    TensorPB hidden_states = 4;
    TensorPB loss = 5;
    TensorPB logits = 6;
    TensorPB all_probs = 7;
    TensorPB all_hidden_states = 8;
}

message GenerateOutputsPB {
    int64 request_id = 1;
    FlattenOutputPB flatten_output = 2;
    int64 receive_load_time = 3;
    int64 start_load_time = 4;
    int64 receive_generate_time = 5;
    int64 load_done_time = 6;
    int64 begin_compute_time = 7;
    int64 compute_done_time = 8;
    RpcErrorPB error_info = 9;
}

// return to python client
message ErrorDetailsPB {
    int64 error_code = 1;
    string error_message = 2;
}

enum ErrorCodePB {
    NONE_ERROR = 0;
    UNKNOWN_ERROR = 1;
    CANCELLED = 2;
    LOAD_CACHE_TIMEOUT = 3;
    CACHE_STORE_LOAD_CONNECT_FAILED = 4;
    CACHE_STORE_LOAD_SEND_REQUEST_FAILED = 5;
    CACHE_STORE_CALL_PREFILL_TIMEOUT = 6;
    CACHE_STORE_LOAD_RDMA_CONNECT_FAILED = 7;
    CACHE_STORE_LOAD_RDMA_WRITE_FAILED = 8;
    CACHE_STORE_LOAD_BUFFER_TIMEOUT = 9;
    P2P_CONNECTOR_CALL_PREFILL_FAILED = 10;
    P2P_CONNECTOR_LOAD_FROM_PREFILL_FAILED = 11;
    P2P_CONNECTOR_SCHEDULER_CALL_WORKER_FAILED = 12;
    P2P_CONNECTOR_SCHEDULER_STREAM_RESOURCE_FAILED = 13;
    P2P_CONNECTOR_SCHEDULER_FILL_RESPONSE_FAILED = 14;
    P2P_CONNECTOR_WORKER_ASYMMETRIC_TP_FAILED = 15;
    P2P_CONNECTOR_WORKER_HANDLE_READ_TIMEOUT = 16;
    P2P_CONNECTOR_WORKER_HANDLE_READ_CANCELLED = 17;
    P2P_CONNECTOR_WORKER_HANDLE_READ_TRANSFER_FAILED = 18;
    P2P_CONNECTOR_WORKER_READ_TRANSFER_RDMA_FAILED = 19;
    P2P_CONNECTOR_WORKER_READ_BUFFER_MISMATCH = 20;
    P2P_CONNECTOR_WORKER_HANDLE_READ_TRANSFER_TIMEOUT = 21;
    P2P_CONNECTOR_WORKER_READ_FAILED = 22;
    P2P_CONNECTOR_WORKER_READ_CANCELED = 23;
    P2P_CONNECTOR_WORKER_READ_TIMEOUT = 24;
    P2P_CONNECTOR_WORKER_READ_TRANSFER_NOT_DONE = 25;
}

// transfer between prefill and decode
message RpcErrorPB {
    ErrorCodePB error_code = 1;
    string error_message = 2;
}

message EmptyPB {}

enum RemoteStage {
    ALLOCATE = 0;
    LOAD = 1;
    GENERATE = 2;
}

message GenerateRequestPB {
    RemoteStage stage = 1;
    int64 request_id = 2;
    string client_id = 3;
    int64 start_time = 4;
    int32 first_generate_token_id = 5;
    GenerateInputPB input = 6;
    repeated string peer_addrs = 7;
    repeated int32 propose_token_ids = 8;
    repeated int32 position_ids = 9;
    TensorPB propose_probs = 10;
    TensorPB propose_hidden = 11;
}

// in tp case, decode master broadcast to decode worker
message BroadcastLoadRequestPB {
    int64 request_id = 1;
    string request_key = 2;
    repeated string peer_addrs = 3;
    repeated int64 cache_keys = 4;
    repeated int32 block_ids = 5;
    int64 block_num = 6;
    int64 reuse_block_size = 7;
    int64 timeout_ms = 8;
    int64 dp_rank = 9;
    int32 partition_count = 10;
    int32 partition_id = 11;
    repeated IntVector group_block_ids = 12;

}

message BroadcastLoadResponsePB {
    RpcErrorPB error_info = 1;
    int64 done_time_us = 2;
}

message RemoteFinishRequestPB {
    int64 request_id = 1;
}

message RemoteGenerateRequestPBNew {
    GenerateInputPB input = 1;
    string client_id = 2;
    int64 start_time_us = 3;
    repeated string addrs = 4;
    repeated int32 block_ids = 5;
    int64 reuse_block_size = 6;
    string mtp_hidden_states_key = 7;
    bool use_mla = 8;
    int32 layer_num = 9;
    int64 deadline_us = 10;
}

message RemoteGenerateResponsePBNew {
    ErrorDetailsPB error_info = 1;
    GenerateOutputsPB output = 2;
    int32 first_generate_token_id = 3;
    int64 first_token_rt_us = 4;
    bool finished = 5;
}

message RemoteStorePartition {
    string remote_addr = 1;
    int32 remote_partition_id = 2;
    int32 remote_partition_count = 3;
    int32 local_partition_id = 4;
    int32 local_partition_count = 5;
}

message RemoteStoreRequestPB {
    int64 dp_rank = 1;
    int64 request_id = 2;
    string request_key = 3;
    repeated int32 decode_block_ids = 4;
    repeated int32 prefill_block_ids = 5;
    int64 reuse_block_size = 6;
    repeated RemoteStorePartition partition_infos = 7;
    int64 deadline_us = 8;
    string client_id = 9;
}

message RemoteStoreResponsePB {
    RpcErrorPB error_info = 1;
    int64 done_time_us = 2;
}

message StatusVersionPB {
    int64 latest_cache_version = 1;
    int64 latest_finished_version = 2;
}

message CacheVersionPB {
    int64 latest_cache_version = 1;
    bool need_cache_keys = 2;
}

// Aggregate-of-pod cache status returned by DP0.
//   available_kv_cache / total_kv_cache : sum across DP ranks
//   cache_keys                          : union across DP ranks (any-rank match)
//   dp_cache[]                          : per-rank breakdown (empty when dp_size==1);
//                                         each element's own dp_cache[] is empty
//                                         (peers respond via DpInternalGetCacheStatus
//                                         and never re-aggregate, so the recursion
//                                         terminates at depth 1)
//   ip / grpc_port                      : populated by DP0 on each dp_cache[] entry
//                                         from local ParallelismConfig.dp_peer_addrs;
//                                         left empty on the outer message
message CacheStatusPB {
    int64 available_kv_cache = 1;
    int64 total_kv_cache = 2;
    int64 block_size = 3;
    int64 version = 4;
    map<int64, bool> cache_keys = 5;
    repeated CacheStatusPB dp_cache = 6;
    string ip = 7;
    int32 grpc_port = 8;
}

message UpdateSchedulerInfoRequestPB {
    string scheduler_info = 1;
}

message SetLogLevelRequestPB {
    string log_level = 1;
}

message StartProfileRequestPB {
    string trace_name = 1;
    int32 start_step = 2;
    int32 num_steps = 3;
    bool enable_all_rank = 4;
}

message StartProfileInternalRequestPB {
    string trace_name = 1;
    int32 start_step = 2;
    int32 num_steps = 3;
}

message CheckHealthResponsePB {
    string health = 1;
}

message UpdateEplbConfigRequestPB {
    string mode = 1;
    int32 update_time = 2;
}

message TaskInfoPB {
    int64 request_id = 1;
    reserved 2;
    reserved "inter_request_id";
    int64 prefix_length = 3;
    int64 input_length = 4;
    int64 waiting_time_ms = 5;
    int64 iterate_count = 6;
    int64 end_time_ms = 7;
    int64 dp_rank = 8;
    bool is_waiting = 9;
}

message UpdateWeightsRequestPB {
    string name = 1;
    string desc = 2;
    string method = 3;
}

// Aggregate-of-pod worker status returned by DP0.
//   available_concurrency / waiting_query_len / running_query_len : sum across DP ranks
//   step_latency_ms                                               : max
//   iterate_count / latest_finished_version                       : min (safe lower bound)
//   alive                                                         : AND
//   running_task_info / finished_task_list                        : union (tasks carry dp_rank)
//   dp_status[]                                                   : per-rank breakdown (empty
//                                                                   when dp_size==1); each
//                                                                   element's own dp_status[]
//                                                                   is empty (recursion
//                                                                   terminates at depth 1)
//   ip / grpc_port                                                : populated by DP0 on each
//                                                                   dp_status[] entry; left
//                                                                   empty on the outer message
//
// dp_size==1 callers see the legacy flat message — outer fields equal the only rank's values.
message WorkerStatusPB {
    string role = 1;
    int32 available_concurrency = 2;
    repeated TaskInfoPB running_task_info = 3;
    repeated TaskInfoPB finished_task_list = 4;
    int32 waiting_query_len = 5;
    int32 running_query_len = 6;
    double step_latency_ms = 7;
    int32 iterate_count = 8;
    int32 dp_size = 9;
    int32 tp_size = 10;
    int64 status_version = 12;
    bool alive = 13;
    string precision = 14;
    int64 latest_finished_version = 15;
    repeated WorkerStatusPB dp_status = 16;
    string ip = 17;
    int32 grpc_port = 18;
}

message EmbeddingInputPB {
    repeated int32 token_ids = 1;
    repeated int32 token_type_ids = 2;
    repeated int32 input_lengths = 3;
    int64 request_id = 4;
    repeated MultimodalInputPB multimodal_features = 5;
    string vit_role_addr = 6;
}

message EmbeddingHealthRequestPB {
    int64 request_id = 1;
}

message EmbeddingTensorMapPB {
    map<string, TensorPB> tensor_map = 1;
}

message EmbeddingOutputPB {
    bool output_is_tensor = 1;
    TensorPB output_t = 2;
    repeated EmbeddingTensorMapPB output_map = 3;
}

service EmbeddingRpcService {
    rpc embedding(EmbeddingInputPB) returns (EmbeddingOutputPB);
    rpc health(EmbeddingHealthRequestPB) returns (EmptyPB);
}

message MemoryOperationRequestPB {
    message CopyItem {
        int32 mem_block = 1;
        repeated int32 gpu_blocks = 2;
    }
    enum CopyDirection {
        H2D = 0;
        D2H = 1;
    }
    repeated CopyItem copy_items = 1;
    CopyDirection copy_direction = 2;
}

message MemoryOperationResponsePB {
    bool success = 1;
}

message TPWorkerInfoPB {
    string ip = 1;
    int32 cache_store_port = 2;
}

message LayerCacheBlockPB {
    uint32 layer_id = 1;
    repeated int64 cache_keys = 2;
    repeated uint32 block_ids = 3;
}

enum P2PConnectorBroadcastType {
    READ = 0;
    HANDLE_READ = 1;
    CANCEL_READ = 2;
    CANCEL_HANDLE_READ = 3;
}

message P2PConnectorBroadcastTpRequestPB {
    repeated LayerCacheBlockPB layer_blocks = 1;
    repeated TPWorkerInfoPB peer_workers = 2;
    string unique_key = 3;
    int64 request_id = 4;
    int64 deadline_ms = 5;
    P2PConnectorBroadcastType type = 6;
    // TP size of the remote side (prefill_tp_size for decode, decode_tp_size for prefill)
    int32 remote_tp_size = 8;
}

// GetPeerInfo: Decode calls this on Prefill to exchange TP size before recv registration
message GetPeerInfoRequestPB {
    string requester_ip = 1;
    int32  requester_tp_size = 2;
}

message GetPeerInfoResponsePB {
    int32  tp_size = 1;
}

message P2PConnectorBroadcastTpResponsePB {
    ErrorCodePB error_code = 1;
    string error_message = 2;
}

message P2PConnectorStartLoadRequestPB {
    string unique_key = 1;
    repeated TPWorkerInfoPB workers = 2;
    int64 deadline_ms = 3;
}

// Side-channel tensor blob: carries named tensor data between prefill and decode
message SideChannelTensorPB {
    TensorPB tensor = 1;
}

// Side-channel payload: replaces fixed first_token/reuse/SP/position_ids fields
// Keys: "propose_tokens", "propose_probs", "propose_hidden", "position_ids"
message SideChannelPayloadPB {
    map<string, SideChannelTensorPB> tensors = 1;
    // Scalar fields that don't fit tensor format
    int64  first_generate_token_id = 2;
    int32  total_reuse_len         = 3;
    int32  local_reuse_len         = 4;
    int32  remote_reuse_len        = 5;
    int32  memory_reuse_len        = 6;
}

message P2PConnectorStartLoadResponsePB {
    // Legacy fixed fields reserved (replaced by SideChannelPayloadPB)
    reserved 1 to 8;
    reserved "first_generate_token_id", "total_reuse_len", "local_reuse_len", "remote_reuse_len", "propose_token_ids", "propose_probs", "propose_hidden", "position_ids";

    // Error handling - preserve field numbers 9, 10 for backward compatibility with deployed nodes
    ErrorCodePB error_code = 9;
    string error_message = 10;

    // New side-channel payload: all data carried as structured map + scalars
    // Field number 12+ to avoid conflict with legacy error_code (was field 9 in old proto)
    SideChannelPayloadPB payload = 12;
}

enum RemoteOpType {
    REMOTE_OPERATION_UNSPECIFIED = 0;
    REMOTE_OPERATION_READ = 1;
    REMOTE_OPERATION_WRITE = 2;
}

message RemoteBoolMasksTypePB { repeated bool values = 1; }
message RemoteBlockMaskPB {
    oneof info {
        int32 offset = 1;
        RemoteBoolMasksTypePB bool_masks = 2;
    }
}

message FunctionRequestPB {
    oneof request {
        MemoryOperationRequestPB mem_request = 1;
        RemoteOperationRequestPB remote_request = 2;
        P2PConnectorBroadcastTpRequestPB p2p_request = 3;
    }
}

message RemoteOperationRequestPB {
    RemoteOpType op = 1;
    string trace_id = 2;
    repeated int32 group_ids = 3;
    repeated int32 block_ids = 4;
    repeated string uris = 5;
}

message RemoteOperationResponsePB {
    RemoteBlockMaskPB succeed_block = 1;  // for read/write, TODO
    repeated string actual_uris = 2; // only for write
}

message FunctionResponsePB {
    oneof response {
        MemoryOperationResponsePB mem_response = 1;
        RemoteOperationResponsePB remote_response = 2;
        P2PConnectorBroadcastTpResponsePB p2p_response = 3;
    }
}

message BatchGenerateInputPB {
    repeated GenerateInputPB inputs = 1;
    // V1-α DP batching: per-batch unique ID assigned by Master, used for ack
    // correlation, lookup, and cascade Cancel. Required for the async Enqueue path;
    // the legacy synchronous BatchGenerateCall ignores it.
    int64 batch_id = 2;
}

// V1-α DP batching: Master.Enqueue acknowledgement, returned immediately
// (before prefill actually runs).
message EnqueueAckPB {
    int64 batch_id = 1;
    bool accepted = 2;
    string error_message = 3;
}

// V1-α DP batching: Frontend → Decode token-stream pull request.
message FetchRequestPB {
    int64 request_id = 1;
}

// V1-α DP batching: Master → P/D cancel request. Idempotent.
message CancelRequestPB {
    int64 request_id = 1;
}

message BatchGenerateResultPB {
    GenerateOutputsPB final_output = 1;
    RpcErrorPB error_info = 2;
}

message BatchGenerateOutputsPB {
    repeated BatchGenerateResultPB results = 1;
}

service RpcService {
    rpc GetWorkerStatus(StatusVersionPB) returns (WorkerStatusPB);
    rpc GetCacheStatus(CacheVersionPB) returns (CacheStatusPB);
    rpc GenerateStreamCall(GenerateInputPB) returns (stream GenerateOutputsPB);
    rpc BatchGenerateCall(BatchGenerateInputPB) returns (BatchGenerateOutputsPB);
    // V1-α DP batching: Master → Prefill async fire-and-forget batch submission.
    // Engine MUST treat every input sharing the same batch_id as a DP-aligned atomic
    // step: forward together in one step, never split, never interleaved with other
    // queued requests, and slot-pinned by input.dp_rank.
    rpc Enqueue(BatchGenerateInputPB) returns (EnqueueAckPB);
    // V1-α DP batching: Frontend → Decode token stream pull by request_id, replacing
    // the legacy GenerateStreamCall→Prefill path (KV is still pushed from Prefill to
    // Decode by RemoteGenerate).
    rpc FetchResponse(FetchRequestPB) returns (stream GenerateOutputsPB);
    // V1-α DP batching: Master → P/D cascade cancel. Idempotent — unknown or
    // already-completed request_ids also return success.
    rpc Cancel(CancelRequestPB) returns (EmptyPB);
    rpc RemoteLoad(BroadcastLoadRequestPB) returns (BroadcastLoadResponsePB);
    rpc RemoteGenerate(stream GenerateRequestPB) returns (stream GenerateOutputsPB);
    rpc RemoteFinish(RemoteFinishRequestPB) returns (EmptyPB);
    rpc RemoteFinishNew(RemoteFinishRequestPB) returns (EmptyPB);

    rpc CheckHealth(EmptyPB) returns (CheckHealthResponsePB);
    rpc UpdateEplbConfig(UpdateEplbConfigRequestPB) returns (EmptyPB);
    rpc SetPause(EmptyPB) returns (EmptyPB);
    rpc SetRestart(EmptyPB) returns (EmptyPB);
    rpc SetLogLevel(SetLogLevelRequestPB) returns (EmptyPB);
    rpc StartProfile(StartProfileRequestPB) returns (EmptyPB);
    rpc StartProfileInternal(StartProfileInternalRequestPB) returns (EmptyPB);
    rpc UpdateSchedulerInfo(UpdateSchedulerInfoRequestPB) returns (EmptyPB);

    rpc UpdateWeights(UpdateWeightsRequestPB) returns (EmptyPB);
    rpc RemoteGenerateNew(RemoteGenerateRequestPBNew) returns (RemoteGenerateResponsePBNew);
    rpc RemoteStore(RemoteStoreRequestPB) returns (RemoteStoreResponsePB);

    rpc ExecuteFunction(FunctionRequestPB) returns (FunctionResponsePB);
    rpc StartLoad(P2PConnectorStartLoadRequestPB) returns (P2PConnectorStartLoadResponsePB);
    rpc GetPeerInfo(GetPeerInfoRequestPB) returns (GetPeerInfoResponsePB);
}

// Response type intentionally changed as part of multimodal refactoring — not a rolling-upgrade concern
// because VIT proxy and LLM backend are always deployed together in this service.
service MultimodalRpcService {
    rpc GetWorkerStatus(StatusVersionPB) returns (WorkerStatusPB);
    rpc GetCacheStatus(CacheVersionPB) returns (CacheStatusPB);
    rpc RemoteMultimodalEmbedding(MultimodalInputsPB) returns (MultimodalOutputPB);
}

// Intra-pod ONLY. DP0 fan-out to peer DP workers (dp_rank > 0). Master / FlexLB
// / Frontend MUST NOT target this service — peer endpoints are not registered
// in service discovery and the responses are NOT aggregated (they are the
// caller-local view, used by DP0 to assemble the outer aggregate).
message DpInternalEnqueueRequestPB {
    GenerateInputPB input = 1;
}

message DpInternalEnqueueResponsePB {
    int64 request_id = 1;
    ErrorDetailsPB error_info = 2;
}

service DpInternalService {
    // DP0 → peer rank: deliver one slot of a batch. Atomicity / DP barrier are
    // enforced collectively by all peers having received their slot before the
    // next forward step.
    rpc DpInternalEnqueue(DpInternalEnqueueRequestPB) returns (DpInternalEnqueueResponsePB);
    // DP0 → peer rank: probe local status to build the outer
    // WorkerStatusPB.dp_status / CacheStatusPB.dp_cache. Peer returns its own
    // local view; never re-aggregates (the outer dp_status[]/dp_cache[] on the
    // peer response stays empty, terminating the recursion at depth 1).
    rpc DpInternalGetWorkerStatus(StatusVersionPB) returns (WorkerStatusPB);
    rpc DpInternalGetCacheStatus(CacheVersionPB) returns (CacheStatusPB);
    // DP0 → peer rank: cascade cancel for partial Enqueue rollback. Idempotent.
    rpc DpInternalCancel(CancelRequestPB) returns (EmptyPB);
}
