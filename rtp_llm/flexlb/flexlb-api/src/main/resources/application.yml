spring:
  application:
    name: flexlb-api
  profiles:
    active: default
  main:
    web-application-type: reactive
  codec:
    max-in-memory-size: ${MAX_IN_MEMORY_SIZE:5MB}
  lifecycle:
    timeout-per-shutdown-phase: ${FLEXLB_SHUTDOWN_TIMEOUT:30s}

flexlb:
  monitor:
    provider: ${FLEXLB_MONITOR_PROVIDER:noop}
  log:
    path: ${FLEXLB_LOG_PATH:/home/admin/ai-whale/logs}
    async-queue-size: ${FLEXLB_LOG_ASYNC_QUEUE_SIZE:16384}
  # CPU-bound block hashing pool: use core threads first, queue pending work, then
  # expand up to max threads when the queue is full. Extra threads expire after keep-alive.
  block-hash:
    core-thread-count: ${FLEXLB_BLOCK_HASH_CORE_THREAD_COUNT:8}
    max-thread-count: ${FLEXLB_BLOCK_HASH_MAX_THREAD_COUNT:32}
    keep-alive-seconds: ${FLEXLB_BLOCK_HASH_KEEP_ALIVE_SECONDS:60}
    queue-capacity: ${FLEXLB_BLOCK_HASH_QUEUE_CAPACITY:16384}

logging:
  group:
    flexlb: org.flexlb,flexlbLogger,syncLogger,syncConsistencyLogger
  level:
    root: info
    flexlb: ${FLEXLB_LOG_LEVEL:INFO}
    io.grpc: info
    com.google.protobuf: info
    org.flexlb.utils.LoggingUtils: trace
server:
  port: 7001
  shutdown: graceful

management:
  server:
    port: 7002
  endpoints:
    web:
      base-path: /
      exposure:
        include: "*"
  metrics:
    tags:
      application: flexlb-api

trace:
  otel:
    web:
      filter-order: 0x7fffffff
      skip-pattern: ${OTEL_TRACE_SKIP_PATTERN}
    config:
      service-name: flexlb
      instrumentation-name: trace
    exporter:
      otlp:
        enabled: true
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      logging:
        enabled: true
        format: json
otel:
  exporter:
    otlp:
      endpoint: none
