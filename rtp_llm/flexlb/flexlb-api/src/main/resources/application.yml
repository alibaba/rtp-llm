spring:
  application:
    name: flexlb-api
  profiles:
    active: default
  main:
    web-application-type: reactive
  codec:
    max-in-memory-size: ${MAX_IN_MEMORY_SIZE:5MB}
logging:
  level:
    root: info
    io.grpc: info
    com.google.protobuf: info
    org.flexlb.utils.LoggingUtils: trace
server:
  port: 7001

management:
  server:
    port: 7002
  endpoints:
    web:
      base-path: /
      exposure:
        include: "*"
  metrics:
    tags:
      application: flexlb-api

trace:
  otel:
    web:
      filter-order: 0x7fffffff
      skip-pattern: ${OTEL_TRACE_SKIP_PATTERN}
    config:
      service-name: flexlb
      instrumentation-name: trace
    exporter:
      otlp:
        enabled: true
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      logging:
        enabled: true
        format: json
otel:
  exporter:
    otlp:
      endpoint: none

flexlb:
  monitor:
    # Default on. Set FLEXLB_MONITOR_ENABLED=false env var to disable.
    # When enabled with 750+ engines, /prometheus returns 23MB (139K series).
    enabled: true
    # Set to false to aggregate per-engine metrics (reduces ~139K series to ~250)
    # Default: per-engine tags retained (high cardinality with many engines)
    per-engine-tags: true
    # Default: critical-only metrics reported. Set FLEXLB_MONITOR_MODE=all to report all metrics.
    mode: critical-only
